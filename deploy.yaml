import:
  - recipe/laravel.php

config:
  repository: "git@github.com:matrocheetos/cardapio-api.git"
  ssh_multiplexing: false

hosts:
  pratofacil:
    provision_user: ubuntu
    remote_user: deployer
    deploy_path: "~/cardapio-api"
    http_user: caddy

tasks:
  optimize:
    - cd: "{{release_path}}"
    - run: "php artisan scramble:cache"

after:
  deploy:failed: deploy:unlock
  artisan:optimize: optimize
