paths:
  # Lista
  /api/cardapio/categorias:
    get:
      summary: Lista todas as categorias
      tags: ["Categorias"]
      responses:
        '200':
          description: Lista de categorias retornada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/Categoria'
  # Lista por ID
  /api/cardapio/categorias/{id_categoria}:
    get:
      summary: Lista uma categoria por ID
      tags: ["Categorias"]
      parameters:
        - name: id_categoria
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Categoria retornada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Categoria'
  # Cria
  /api/cardapio/categorias/cria:
    post:
      summary: Cria uma nova categoria
      tags: ["Categorias"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                descricao:
                  type: string
    responses:
      '200':
        description: Categoria criada com sucesso
        content:
          application/json:
            schema:
              type: object
              properties:
                msg:
                  type: string
                result:
                  type: array
                  items:
                    $ref: '#/components/schemas/Categoria'
  # Edita
  /api/cardapio/categorias/edita/{id_categoria}:
    put:
      summary: Edita uma categoria
      tags: ["Categorias"]
      parameters:
        - name: id_categoria
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                descricao:
                  type: string
      responses:
        '200':
          description: Categoria editada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/Categoria'
  # Deleta
  /api/cardapio/categorias/deleta/{id_categoria}:
    delete:
      summary: Deleta uma categoria
      tags: ["Categorias"]
      parameters:
        - name: id_categoria
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Categoria deletada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                  result:
                    type: "null"

components:
  schemas:
    Categoria:
      type: object
      properties:
        id_categoria:
          type: integer
        descricao:
          type: string