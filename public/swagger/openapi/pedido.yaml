paths:
  # Lista
  /api/cardapio/pedido:
    get:
      summary: Lista todos os pedidos
      tags: ["Pedidos"]
      responses:
        '200':
          description: Lista de pedidos retornada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/Pedido'
  # Lista por ID
  /api/cardapio/pedido/{id_pedido}:
    get:
      summary: Lista um pedido por ID
      tags: ["Pedidos"]
      parameters:
        - name: id_pedido
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Pedido retornado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/Pedido'
  # Cria
  /api/cardapio/pedido/cria:
    post:
      summary: Cria um novo pedido
      tags: ["Pedidos"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pedido:
                  type: array
                  items:
                    type: object
                    properties:
                      comanda:
                        type: integer
                      id_produto:
                        type: integer
                      observacao:
                        type: string
                    required:
                      - comanda
                      - id_produto
      responses:
        '200':
          description: Pedido criado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/Pedido'
  # Edita
  /api/cardapio/pedido/edita/{id_pedido}:
    put:
      summary: Edita um pedido
      tags: ["Pedidos"]
      parameters:
        - name: id_pedido
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                comanda:
                  type: integer
                id_produto:
                  type: integer
                observacao:
                  type: string
                status_pedido:
                  type: string
                  enum: ["PREPARANDO", "PRONTO", "ENTREGUE"]
      responses:
        '200':
          description: Pedido editado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/Pedido'
  # Deleta
  /api/cardapio/pedido/deleta/{id_pedido}:
    delete:
      summary: Deleta um pedido
      tags: ["Pedidos"]
      parameters:
        - name: id_pedido
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Pedido deletado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                  result:
                    type: "null"

components:
  schemas:
    Pedido:
      type: object
      properties:
        id_pedido:
          type: integer
        comanda:
          type: integer
        id_produto:
          type: integer
        observacao:
          type: string
        data_pedido:
          type: string
          format: date-time
        status_pedido:
          type: string
          enum: ["PREPARANDO", "PRONTO", "ENTREGUE"]