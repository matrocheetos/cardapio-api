services:
  # PHP Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: symfony_app
    restart: unless-stopped
    working_dir: /var/www/symfony
    volumes:
      - ./:/var/www/symfony
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - symfony_network
    depends_on:
      - db
    environment:
      - APP_ENV=dev
      - DATABASE_URL=mysql://symfony:symfony_password@db:3306/symfony?serverVersion=8.0

  # Nginx Service
  webserver:
    image: nginx:alpine
    container_name: symfony_webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/symfony
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - symfony_network
    depends_on:
      - app

  # MySQL Service
  db:
    image: mysql:8.0
    container_name: symfony_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: symfony
      MYSQL_USER: symfony
      MYSQL_PASSWORD: symfony_password
      MYSQL_ROOT_PASSWORD: symfony_root_password
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/my.cnf
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - symfony_network
    ports:
      - "3306:3306"

  # phpMyAdmin Service (optional but useful for database management)
  #  phpmyadmin:
  #    image: phpmyadmin/phpmyadmin
  #    container_name: symfony_phpmyadmin
  #    restart: unless-stopped
  #    ports:
  #      - "8080:80"
  #    environment:
  #      PMA_HOST: db
  #      MYSQL_ROOT_PASSWORD: symfony_root_password
  #    networks:
  #      - symfony_network
  #    depends_on:
  #      - db

networks:
  symfony_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local